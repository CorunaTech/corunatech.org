title: "PostgreSQL: Lo que me gustaría saber antes de usarla"
description: "En esta charla veremos cómo no utilizar PostgreSQL: problemas encontrados por un mal diseño de patrones de acceso a datos y cómo solucionarlos después de entender los internals de PostgreSQL (índices, análisis de consultas y optimización). Se expondrán casos prácticos reales donde veremos incrementos de rendimiento después de aplicar las optimizaciones necesarias."
