title: "Weave.js: crear un editor visual colaborativo non debería ser tan difícil"
description: >
  Queres construír o teu propio "mini-Figma" sen pelearte coa sincronización en
  tempo real? Jesús Piñeiro compartirá a súa experiencia desenvolvendo Weave.js,
  unha librería open source centrada en simplificar a parte máis complexa da
  colaboración en tempo real. Weave.js é un framework UI headless deseñado para
  construír aplicacións colaborativas visuais en tempo real sobre un canvas HTML,
  como Figma, Canva ou Miro. Despois haberá tempo para preguntas e networking.
