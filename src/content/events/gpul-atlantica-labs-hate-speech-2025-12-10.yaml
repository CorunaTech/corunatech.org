title: "From Words to Wisdom: Hate Speech Detection in the Age of LLMs"
description: El discurso de odio en línea no es solo una cuestión de palabras, sino de contexto, poder e intención. Paloma Piot, investigadora predoctoral en el IRLab (UDC), analiza cómo las técnicas de detección automática del odio se ven transformadas por los retos y posibilidades de los Grandes Modelos de Lenguaje (LLMs), con foco en Knowledge Distillation, RAG y sesgos en distintos contextos culturales.
