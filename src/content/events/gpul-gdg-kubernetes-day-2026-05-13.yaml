title: "Kubernetes & AI, con sentidiño"
description: Un encuentro técnico en A Coruña para hablar de Kubernetes, IA en producción e supervisión responsable. Tres charlas de referentes do sector (Antonio Ojea de Google/Kubernetes Steering Committee, Carlos Sánchez de Adobe/ASF e Daniel Mellado de Red Hat), seguidas dunha mesa redonda sobre IA responsable e cloud native con participación de AESIA, e peche con pinchos e networking. Organizado por GPUL e GDG A Coruña.
